<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Место</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>

<body>

  <div class="page">
    <header class="header">
      <img class="header__logo" alt="Место" src="./images/vectorlogo.svg">
      
    </header>
    <main class="content">
      <section class="profile content__profile">
        <img class="profile__avatar" alt="Жак-Ив Кусто" src="./images/avatarimage.jpg">
        <div class="profile__info">
          <div class="profile__container">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button type="button" class="profile__edit-button"></button>

          </div>
          <p class="profile__about">Исследователь океана</p>
        </div>
        <button class="profile__add-button" type="button"></button>
      </section>

      <section class="elements">
        <div class="element">
          <img class="element__image" alt="Карачаевск" src="./images/kirill-pershin-1088404-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Карачаевск</h2>
            <button type="button" class="element__icon"></button>
            
          </div>
        </div>

        <div class="element">
          <img class="element__image" alt="Эльбрус" src="./images/kirill-pershin-1404681-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Гора Эльбрус</h2>
            <button type="button" class="element__icon"></button>
          </div>
        </div>

        <div class="element">
          <img class="element__image" alt="Домбай" src="./images/kirill-pershin-1556355-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Домбай</h2>
            <button type="button" class="element__icon"></button>
          </div>
        </div>

        <div class="element">
          <img class="element__image" alt="Эльбрус" src="./images/kirill-pershin-1404681-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Гора Эльбрус</h2>
            <button type="button" class="element__icon"></button>
          </div>
        </div>

        <div class="element">
          <img class="element__image" alt="Карачаевск" src="./images/kirill-pershin-1088404-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Карачаевск</h2>
            <button type="button" class="element__icon"></button>
          </div>
        </div>

        <div class="element">
          <img class="element__image" alt="Домбай" src="./images/kirill-pershin-1556355-unsplash.jpg">
          <div class="element__info">
            <h2 class="element__heading">Домбай</h2>
            <button type="button" class="element__icon"></button>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
    </footer>
  </div>

  <section class="popup">
    <form class="popup__container">
      <button type="button" class="popup__close-icon"></button>
      <h2 class="popup__heading">Редактировать профиль</h2>
      <input type="text" placeholder="имя"  class="popup__about" id="name">
      <input type="text" placeholder="о себе" class="popup__about" id="career">
      <button type="submit" class="popup__submit">Сохранить</button>
    </form>
  </section>

  <script src="./scripts/script.js"></script>
</body>

</html>
